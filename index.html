<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Locator Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
            font-weight: 300;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 0;
            height: 600px;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #f0f0f0;
        }

        .sidebar {
            background: #f9f9f9;
            border-left: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 24px;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 0.85em;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .location-info {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 12px;
        }

        .location-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .location-value {
            font-size: 0.95em;
            color: #333;
            font-family: 'Monaco', monospace;
            word-break: break-all;
        }

        .building-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .building-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }

        .building-item:hover {
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
            transform: translateX(4px);
        }

        .building-item.house {
            border-left-color: #4CAF50;
        }

        .building-item.store {
            border-left-color: #FF9800;
        }

        .building-number {
            font-weight: 700;
            font-size: 1em;
            color: #333;
            margin-bottom: 4px;
        }

        .building-type {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .status {
            font-size: 0.85em;
            color: #999;
            margin-top: 12px;
            text-align: center;
        }

        .status.loading {
            color: #667eea;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                height: auto;
            }

            .sidebar {
                border-left: none;
                border-top: 1px solid #e0e0e0;
                max-height: 300px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            #map {
                height: 400px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        input[type="text"],
        select {
            transition: all 0.2s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea !important;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]::placeholder {
            color: #bbb;
        }

        .icon-legend {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 0.9em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .legend-icon.house {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            font-size: 0.8em;
        }

        .legend-icon.store {
            background: #FF9800;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ Building Locator</h1>
            <p>Live location mapping with building numbers and categories</p>
        </div>

        <div class="content">
            <div id="map"></div>
            
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">Your Location</div>
                    <div class="status" id="status">Click Add Building to get location</div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">Add Building</div>
                    <button class="btn-primary" onclick="openAddBuildingForm()" style="width: 100%; margin-bottom: 8px; padding: 12px; font-size: 1em;">
                        ➕ Add Building
                    </button>
                    <div style="font-size: 0.85em; color: #666; text-align: center;">
                        Automatically detects your location
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">Downloads</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <button onclick="downloadBuildingsPDF()" style="
                            padding: 10px;
                            background: #FF6B6B;
                            color: white;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-size: 0.85em;
                            font-weight: 600;
                        ">📄 Buildings PDF</button>
                        <button onclick="downloadBuildingsCSV()" style="
                            padding: 10px;
                            background: #4285F4;
                            color: white;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-size: 0.85em;
                            font-weight: 600;
                        ">📊 CSV for Sheets</button>
                        <button onclick="downloadMapPDF()" style="
                            padding: 10px;
                            background: #34A853;
                            color: white;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-size: 0.85em;
                            font-weight: 600;
                        ">🗺️ Map PDF</button>
                        <button onclick="downloadMapDXF()" style="
                            padding: 10px;
                            background: #EA4335;
                            color: white;
                            border: none;
                            border-radius: 6px;
                            cursor: pointer;
                            font-size: 0.85em;
                            font-weight: 600;
                        ">📐 Map DXF</button>
                    </div>
                </div>
                    <div class="icon-legend">
                        <div class="legend-item">
                            <div class="legend-icon house">🏠</div>
                            <span>House</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-icon store">🏪</div>
                            <span>Store</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">Buildings List</div>
                    <div class="building-list" id="buildingList"></div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let userMarker;
        let tempMarker = null;
        let buildingMarkers = [];
        let userLocation = null;
        let clickedLocation = null;
        let buildings = [];
        let buildingIdCounter = 1;

        // Default center coordinates (New York City)
        const DEFAULT_LAT = 40.7128;
        const DEFAULT_LNG = -74.0060;

        // Download buildings as PDF
        function downloadBuildingsPDF() {
            if (buildings.length === 0) {
                alert('No buildings to download');
                return;
            }

            let content = 'BUILDING LIST\n';
            content += '='.repeat(60) + '\n\n';
            content += new Date().toLocaleString() + '\n\n';
            content += 'Total Buildings: ' + buildings.length + '\n\n';
            content += '-'.repeat(60) + '\n';
            content += 'NO. | TYPE | LATITUDE | LONGITUDE | ACCURACY\n';
            content += '-'.repeat(60) + '\n';

            buildings.forEach((b, idx) => {
                const type = b.type === 'house' ? 'House' : 'Store';
                content += `${b.number} | ${type} | ${b.lat.toFixed(6)} | ${b.lng.toFixed(6)}\n`;
            });

            content += '\n' + '-'.repeat(60) + '\n';
            content += 'Generated by Building Mapper\n';

            // Create downloadable file
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(content));
            element.setAttribute('download', `buildings_${new Date().getTime()}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);

            alert('Buildings list downloaded as TXT file!');
        }

        // Download buildings as CSV for Google Sheets
        function downloadBuildingsCSV() {
            if (buildings.length === 0) {
                alert('No buildings to download');
                return;
            }

            let csv = 'Building Number,Type,Latitude,Longitude,Name\n';
            
            buildings.forEach(b => {
                const type = b.type === 'house' ? 'House' : 'Store';
                csv += `"${b.number}","${type}","${b.lat.toFixed(8)}","${b.lng.toFixed(8)}","${b.name}"\n`;
            });

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv));
            element.setAttribute('download', `buildings_${new Date().getTime()}.csv`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);

            alert('CSV downloaded! Import to Google Sheets:\n1. Open Google Sheets\n2. File > Import > Upload\n3. Select this CSV file');
        }

        // Download map as proper PDF
        function downloadMapPDF() {
            if (buildings.length === 0) {
                alert('No buildings to download');
                return;
            }

            const center = map.getCenter();
            let htmlContent = `
                <div style="font-family: Arial, sans-serif; padding: 20px;">
                    <h1 style="text-align: center; color: #333;">Building Map Report</h1>
                    <hr>
                    <p><strong>Export Date:</strong> ${new Date().toLocaleString()}</p>
                    <p><strong>Map Center:</strong> ${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}</p>
                    <p><strong>Zoom Level:</strong> ${map.getZoom()}</p>
                    
                    ${userLocation ? `
                    <p><strong>Your Location:</strong> ${userLocation.lat.toFixed(6)}, ${userLocation.lng.toFixed(6)}</p>
                    <p><strong>Accuracy:</strong> ${Math.round(userLocation.accuracy)}m</p>
                    ` : ''}
                    
                    <h2 style="margin-top: 30px; color: #333;">Buildings (${buildings.length} total)</h2>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                        <thead>
                            <tr style="background-color: #667eea; color: white;">
                                <th style="border: 1px solid #ddd; padding: 10px; text-align: left;">Building #</th>
                                <th style="border: 1px solid #ddd; padding: 10px; text-align: left;">Type</th>
                                <th style="border: 1px solid #ddd; padding: 10px; text-align: left;">Latitude</th>
                                <th style="border: 1px solid #ddd; padding: 10px; text-align: left;">Longitude</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${buildings.map(b => `
                            <tr>
                                <td style="border: 1px solid #ddd; padding: 10px;">${b.number}</td>
                                <td style="border: 1px solid #ddd; padding: 10px;">${b.type === 'house' ? '🏠 House' : '🏪 Store'}</td>
                                <td style="border: 1px solid #ddd; padding: 10px;">${b.lat.toFixed(8)}</td>
                                <td style="border: 1px solid #ddd; padding: 10px;">${b.lng.toFixed(8)}</td>
                            </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <p style="margin-top: 30px; font-size: 12px; color: #999;">Generated by Building Mapper</p>
                </div>
            `;

            const element = document.createElement('div');
            element.innerHTML = htmlContent;

            const opt = {
                margin: 10,
                filename: `map_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(element).save();
            alert('Map PDF downloaded successfully!');
        }

        // Download map as proper DXF (CAD format)
        function downloadMapDXF() {
            if (buildings.length === 0) {
                alert('No buildings to download');
                return;
            }

            let dxf = '';
            
            // DXF Header
            dxf += '  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1021\n';
            dxf += '  9\n$EXTMIN\n 10\n-1000.0\n 20\n-1000.0\n 30\n0.0\n';
            dxf += '  9\n$EXTMAX\n 10\n1000.0\n 20\n1000.0\n 30\n0.0\n';
            dxf += '  0\nENDSEC\n';

            // Tables Section
            dxf += '  0\nSECTION\n  2\nTABLES\n';
            dxf += '  0\nTABLE\n  2\nLAYER\n 70\n3\n';
            
            // Layer definitions
            dxf += '  0\nLAYER\n  2\nBuildings\n 70\n0\n 62\n7\n  6\nCONTINUOUS\n';
            dxf += '  0\nLAYER\n  2\nHouses\n 70\n0\n 62\n3\n  6\nCONTINUOUS\n';
            dxf += '  0\nLAYER\n  2\nStores\n 70\n0\n 62\n5\n  6\nCONTINUOUS\n';
            
            dxf += '  0\nENDTAB\n  0\nENDSEC\n';

            // Blocks Section
            dxf += '  0\nSECTION\n  2\nBLOCKS\n  0\nENDSEC\n';

            // Entities Section
            dxf += '  0\nSECTION\n  2\nENTITIES\n';

            const center = map.getCenter();
            const scale = 10000; // Scale factor for better readability

            // Add buildings as circles with text
            buildings.forEach((b, idx) => {
                const layer = b.type === 'house' ? 'Houses' : 'Stores';
                
                // Calculate relative coordinates from center
                const dx = (b.lng - center.lng) * scale;
                const dy = (b.lat - center.lat) * scale;

                // Draw circle (CIRCLE entity)
                dxf += '  0\nCIRCLE\n  8\n' + layer + '\n';
                dxf += ' 10\n' + dx.toFixed(2) + '\n';
                dxf += ' 20\n' + dy.toFixed(2) + '\n';
                dxf += ' 30\n0.0\n';
                dxf += ' 40\n20.0\n'; // radius

                // Add text label with building number
                dxf += '  0\nTEXT\n  8\n' + layer + '\n';
                dxf += ' 10\n' + (dx - 15).toFixed(2) + '\n';
                dxf += ' 20\n' + (dy + 5).toFixed(2) + '\n';
                dxf += ' 30\n0.0\n';
                dxf += ' 40\n15.0\n'; // text height
                dxf += '  1\n#' + b.number + '\n';
                dxf += '  7\nSTANDARD\n';
                dxf += ' 72\n0\n 11\n' + (dx - 15).toFixed(2) + '\n 21\n' + (dy + 5).toFixed(2) + '\n 31\n0.0\n';

                // Add point data label
                dxf += '  0\nTEXT\n  8\n' + layer + '\n';
                dxf += ' 10\n' + (dx + 30).toFixed(2) + '\n';
                dxf += ' 20\n' + (dy - 20).toFixed(2) + '\n';
                dxf += ' 30\n0.0\n';
                dxf += ' 40\n8.0\n';
                dxf += '  1\n' + b.lat.toFixed(6) + ',' + b.lng.toFixed(6) + '\n';
                dxf += '  7\nSTANDARD\n';
            });

            // Add reference point at center
            dxf += '  0\nPOINT\n  8\nBuildings\n';
            dxf += ' 10\n0.0\n 20\n0.0\n 30\n0.0\n';

            dxf += '  0\nENDSEC\n  0\nEOF\n';

            // Create file with proper binary handling
            const blob = new Blob([dxf], { type: 'application/x-dxf' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `map_${new Date().getTime()}.dxf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);

            alert('Map DXF downloaded!\nOpen with AutoCAD, LibreCAD, or online DXF viewer');
        }

        // Load buildings from localStorage
        function loadBuildingsFromStorage() {
            try {
                const savedData = localStorage.getItem('buildingMapData');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    buildings = data.buildings || [];
                    buildingIdCounter = data.buildingIdCounter || 1;
                    console.log('Loaded', buildings.length, 'buildings from storage');
                }
            } catch (err) {
                console.error('Error loading from storage:', err);
            }
        }

        // Save buildings to localStorage
        function saveBuildingsToStorage() {
            try {
                const data = {
                    buildings: buildings,
                    buildingIdCounter: buildingIdCounter
                };
                localStorage.setItem('buildingMapData', JSON.stringify(data));
            } catch (err) {
                console.error('Error saving to storage:', err);
            }
        }

        // Initialize map
        function initMap() {
            try {
                // Initialize Leaflet map
                map = L.map('map').setView([DEFAULT_LAT, DEFAULT_LNG], 15);
                
                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(map);

                // Load buildings from storage or use defaults
                loadBuildingsFromStorage();

                if (buildings.length === 0) {
                    // Load default sample buildings only if no saved data
                    const sampleBuildings = [
                        { id: 1, number: '101', type: 'house', lat: DEFAULT_LAT, lng: DEFAULT_LNG, name: 'Residential Building 101' },
                        { id: 2, number: '102', type: 'store', lat: DEFAULT_LAT + 0.001, lng: DEFAULT_LNG, name: 'Shop Center 102' },
                        { id: 3, number: '103', type: 'house', lat: DEFAULT_LAT + 0.002, lng: DEFAULT_LNG, name: 'Residential Building 103' }
                    ];

                    buildings = sampleBuildings;
                    buildingIdCounter = 4;
                }

                loadBuildings();
            } catch (err) {
                console.error('Error initializing map:', err);
            }
        }

        // Create custom marker with building number
        function createMarker(building) {
            if (!map) return;

            const isHouse = building.type === 'house';
            const color = isHouse ? '#4CAF50' : '#FF9800';

            // Create custom HTML icon
            const htmlIcon = L.divIcon({
                html: `
                    <div style="
                        position: relative;
                        width: 48px;
                        height: 60px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    ">
                        <svg width="48" height="60" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));">
                            <path d="M 24 0 C 13.05 0 4 9.05 4 20 C 4 35 24 60 24 60 S 44 35 44 20 C 44 9.05 34.95 0 24 0" fill="${color}"/>
                            <circle cx="24" cy="20" r="16" fill="white"/>
                            <rect x="14" y="10" width="20" height="20" rx="2" fill="${color}"/>
                            <text x="24" y="28" font-size="16" font-weight="bold" text-anchor="middle" fill="white" stroke="black" stroke-width="0.5">${building.number}</text>
                        </svg>
                    </div>
                `,
                iconSize: [48, 60],
                iconAnchor: [24, 60],
                popupAnchor: [0, -60],
                className: 'building-marker'
            });

            const marker = L.marker([building.lat, building.lng], { icon: htmlIcon })
                .addTo(map)
                .bindPopup(`
                    <div style="text-align: center; padding: 8px;">
                        <strong>Building #${building.number}</strong><br>
                        <small>${building.type.toUpperCase()}</small><br>
                        <small>${building.name}</small>
                    </div>
                `, { maxWidth: 200 });

            marker.on('click', () => {
                map.setZoom(17);
                map.setView([building.lat, building.lng]);
                marker.openPopup();
            });

            marker.building = building;
            buildingMarkers.push(marker);
            return marker;
        }

        // Load all buildings on map
        function loadBuildings() {
            buildings.forEach(building => {
                createMarker(building);
            });
            displayBuildingList();
        }

        // Focus on a building (zoom and center)
        function focusBuilding(id) {
            const building = buildings.find(b => b.id === id);
            if (building && map) {
                map.setView([building.lat, building.lng], 17);
            }
        }

        // Delete building
        function deleteBuilding(id) {
            // Find building
            const building = buildings.find(b => b.id === id);
            if (!building) {
                alert('Building not found!');
                return;
            }
            
            if (!confirm(`Delete Building #${building.number}?`)) {
                return;
            }
            
            // Remove marker from map
            let foundMarker = false;
            for (let i = 0; i < buildingMarkers.length; i++) {
                const m = buildingMarkers[i];
                if (m.building?.id === id) {
                    try {
                        map.removeLayer(m);
                        foundMarker = true;
                        buildingMarkers.splice(i, 1);
                        break;
                    } catch (err) {
                        console.error('Error removing marker:', err);
                    }
                }
            }
            
            // Remove from buildings array
            const newBuildings = [];
            for (let i = 0; i < buildings.length; i++) {
                if (buildings[i].id !== id) {
                    newBuildings.push(buildings[i]);
                }
            }
            buildings = newBuildings;
            
            // Save to storage
            saveBuildingsToStorage();
            
            // Update display
            displayBuildingList();
            
            // Success message
            const status = document.getElementById('status');

        // Save edited building
        function saveEditBuilding(id) {
            try {
                const newNumber = document.getElementById('editNumber').value.trim();
                const newType = document.getElementById('editType').value;
                const newLat = parseFloat(document.getElementById('editLat').value);
                const newLng = parseFloat(document.getElementById('editLng').value);

                if (!newNumber) {
                    alert('Building number cannot be empty');
                    return;
                }

                if (isNaN(newLat) || isNaN(newLng)) {
                    alert('Please enter valid latitude and longitude');
                    return;
                }

                if (newLat < -90 || newLat > 90) {
                    alert('Latitude must be between -90 and 90');
                    return;
                }

                if (newLng < -180 || newLng > 180) {
                    alert('Longitude must be between -180 and 180');
                    return;
                }

                // Check if number already exists (but allow same building)
                if (buildings.some(b => b.number === newNumber && b.id !== id)) {
                    alert(`Building #${newNumber} already exists!`);
                    return;
                }

                const building = buildings.find(b => b.id === id);
                if (!building) {
                    alert('Building not found');
                    return;
                }

                const oldNumber = building.number;
                
                // Update building with new values
                building.number = newNumber;
                building.type = newType;
                building.lat = newLat;
                building.lng = newLng;
                building.name = `${newType.charAt(0).toUpperCase() + newType.slice(1)} Building ${newNumber}`;

                // Save to storage
                saveBuildingsToStorage();

                // Update marker on map - remove old and create new
                const markerIndex = buildingMarkers.findIndex(m => m.building.id === id);
                if (markerIndex !== -1) {
                    const oldMarker = buildingMarkers[markerIndex];
                    if (oldMarker) {
                        try {
                            map.removeLayer(oldMarker);
                        } catch (err) {
                            console.error('Error removing old marker:', err);
                        }
                    }
                    buildingMarkers.splice(markerIndex, 1);
                    createMarker(building);
                }

                // Refresh list
                displayBuildingList();

                // Close modal
                closeEditModal();

                // Show success message
                const status = document.getElementById('status');
                status.textContent = `✓ Building #${oldNumber} updated to #${newNumber}!`;
                status.classList.remove('loading');
                setTimeout(() => {
                    status.textContent = 'Click Add Building to get location';
                }, 2000);
            } catch (e) {
                console.error('Error saving edit:', e);
                alert('Error saving changes: ' + e.message);
            }
        }

        function openAddBuildingForm() {
            const status = document.getElementById('status');

            // Get location with timeout

                function(position) {
                    try {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };

                        console.log('Location acquired:', userLocation);

                        // Remove old marker
                        if (userMarker) {
                            try {
                                map.removeLayer(userMarker);
                            } catch (e) {}
                        }

                        // Create marker
                        const userIcon = L.divIcon({
                            html: '<div style="width: 20px; height: 20px; background: #2196F3; border: 3px solid white; border-radius: 50%; box-shadow: 0 2px 8px rgba(33, 150, 243, 0.6);"></div>',
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });

                        userMarker = L.marker([userLocation.lat, userLocation.lng], { icon: userIcon })
                            .addTo(map)
                            .bindPopup('📍 Your Location');

                        // Add accuracy circle
                        if (userLocation.accuracy < 1000) {
                            L.circle([userLocation.lat, userLocation.lng], {
                                radius: userLocation.accuracy,
                                color: '#2196F3',
                                weight: 2,
                                opacity: 0.4,
                                fillOpacity: 0.1
                            }).addTo(map);
                        }

                        // Center map
                        map.setView([userLocation.lat, userLocation.lng], 17);

                        // Update status
                        let accuracy = '🟡 Fair';
                        if (userLocation.accuracy < 10) accuracy = '🟢 Excellent';
                        else if (userLocation.accuracy < 20) accuracy = '🟢 Good';
                        else if (userLocation.accuracy < 50) accuracy = '🟡 Fair';

                        status.innerHTML = `✓ Located!<br><small>Accuracy: ${Math.round(userLocation.accuracy)}m ${accuracy}<br>Lat: ${userLocation.lat.toFixed(6)}<br>Lng: ${userLocation.lng.toFixed(6)}</small>`;
                        status.classList.remove('loading');

                        // Show form
                        setTimeout(showAddBuildingModal, 500);
                    } catch (e) {
                        console.error('Error processing location:', e);
                        status.textContent = '❌ Error: ' + e.message;
                        status.classList.remove('loading');
                        showAddBuildingModal();
                    }
                },
                function(error) {
                    console.error('Geolocation error:', error);
                    let errorMsg = 'Location error';
                    if (error.code === 1) errorMsg = '❌ Permission denied';
                    else if (error.code === 2) errorMsg = '❌ Position unavailable';
                    else if (error.code === 3) errorMsg = '❌ Timeout';
                    
                    status.textContent = errorMsg;
                    status.classList.remove('loading');
                    showAddBuildingModal();
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Add new building from user input

                alert('Please enter a building number');

            let lat, lng;
            if (userLocation) {
                lat = userLocation.lat;
                lng = userLocation.lng;
            } else {
                // Use offset from default location
                const latOffset = (buildings.length * 0.0005) - 0.002;
                const lngOffset = (buildings.length * 0.0003) - 0.001;
                lat = DEFAULT_LAT + latOffset;
                lng = DEFAULT_LNG + lngOffset;
            }

            const newBuilding = {
                id: buildingIdCounter++,
                number: buildingNumber,
                type: buildingType,
                lat: lat,
                lng: lng,
                name: `${buildingType.charAt(0).toUpperCase() + buildingType.slice(1)} Building ${buildingNumber}`
            };

            buildings.push(newBuilding);
            createMarker(newBuilding);
            displayBuildingList();

            // Clear input
            document.getElementById('buildingNumber').value = '';
            document.getElementById('buildingNumber').focus();

            // Show success message with location info

        // Get user location
        function getLocation() {
            if (!map) {

            const status = document.getElementById('status');
            status.textContent = 'Getting location...';
            status.classList.add('loading');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };

                        // Remove old marker if exists
                        if (userMarker) {
                            map.removeLayer(userMarker);
                        }

                        // Create blue marker for user location
                        const userIcon = L.divIcon({
                            html: `
                                <div style="
                                    width: 20px;
                                    height: 20px;
                                    background: #2196F3;
                                    border: 3px solid white;

                        });

                            .addTo(map)
                            .bindPopup('📍 Your Location');

                        // Center map on user
                        map.setView([userLocation.lat, userLocation.lng], 16);

                        // Update status
                        status.innerHTML = `
                            <strong>✓ Located!</strong><br>
                            Lat: ${userLocation.lat.toFixed(4)}<br>
                            Lng: ${userLocation.lng.toFixed(4)}
                        `;
                        status.classList.remove('loading');
                    },
                    (error) => {
                        let errorMsg = '';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMsg = '❌ Permission denied. Use manual entry below.';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMsg = '❌ Location unavailable. Try manual entry.';
                                break;
                            case error.TIMEOUT:
                                errorMsg = '❌ Request timed out.';
                                break;

                        status.textContent = errorMsg;
                        status.classList.remove('loading');
                    },
                    {
                        enableHighAccuracy: false,
                        timeout: 5000,
                        maximumAge: 0
                    }
                );

                status.innerHTML = '❌ Geolocation not available.<br>Use manual entry below.';

        // Clear all markers and buildings

                // Remove all building markers from map
                buildingMarkers.forEach(marker => {
                    try {
                        if (marker && marker._leaflet_id !== undefined) {
                            map.removeLayer(marker);
                        }
                    } catch (e) {
                        console.error('Error removing marker:', e);
                    }
                });
                
                // Remove user marker from map
                if (userMarker && userMarker._leaflet_id !== undefined) {
                    try {
                        map.removeLayer(userMarker);
                    } catch (e) {
                        console.error('Error removing user marker:', e);
                    }
                }
                
                // Clear arrays
                buildingMarkers = [];
                buildings = [];
                userMarker = null;
                
                // Update UI
                displayBuildingList();
                
                // Show success message
                const status = document.getElementById('status');
                status.textContent = '✓ All markers cleared!';
                status.classList.remove('loading');
                setTimeout(() => {
                    status.textContent = 'Click to locate';
                }, 2000);
                
            } catch (e) {
                console.error('Error in clearMarkers:', e);
                alert('Error clearing markers. Check console.');
            }
        }

        // Reset view
        function resetView() {
            if (!map) {
                alert('Map is not loaded yet. Please wait and try again.');
                return;
            }
            try {
                map.setView([DEFAULT_LAT, DEFAULT_LNG], 15);
                
                const status = document.getElementById('status');
                status.textContent = '✓ View reset!';
                setTimeout(() => {
                    status.textContent = 'Click to locate';
                }, 1500);
            } catch (e) {
                console.error('Error in resetView:', e);
                alert('Error resetting view. Check console.');
            }
        }

        // Initialize on load
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
